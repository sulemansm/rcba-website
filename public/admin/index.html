<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RCBA Content Manager</title>
  <link rel="icon" href="/images/rcba_logo.png">
  <style>
    body { margin: 0; font-family: sans-serif; }
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background: #0A0A0F; color: #F0EEE6; gap: 1.5rem;
    }
    #loading img { width: 80px; height: 80px; border-radius: 50%; animation: spin 3s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 1rem; color: #8A8799; }
  </style>
</head>
<body>
  <div id="loading">
    <img src="/images/rcba_logo.png" alt="RCBA Logo">
    <p>Loading Content Manager...</p>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
